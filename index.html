<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Game Discovery Behaviour Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #5BA4B0; --navy: #2E5A87;
    --teal-light: #EAF5F7; --teal-mid: #C2E4EA;
    --ink: #1A1A2E; --ink-mid: #4A4A68; --ink-light: #8888A8;
    --surface: #F7F8FC; --white: #FFFFFF; --border: #E4E6F0;
    --radius: 16px; --radius-sm: 10px;
  }
  html,body { min-height:100%; font-family:'DM Sans',sans-serif; background:var(--surface); color:var(--ink); -webkit-font-smoothing:antialiased; }
  .shell { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:0 20px 80px; }
  .topbar { width:100%; max-width:580px; padding:28px 0 0; display:flex; flex-direction:column; gap:20px; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand-mark { width:36px; height:36px; background:var(--teal); border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'DM Serif Display',serif; font-size:16px; }
  .brand-name { font-size:13px; font-weight:500; color:var(--ink-mid); letter-spacing:.05em; text-transform:uppercase; }
  .progress-wrap { display:flex; flex-direction:column; gap:8px; }
  .progress-meta { display:flex; justify-content:space-between; align-items:center; }
  .progress-section { font-size:12px; font-weight:500; color:var(--teal); letter-spacing:.06em; text-transform:uppercase; }
  .progress-count { font-size:12px; color:var(--ink-light); font-weight:300; }
  .progress-track { height:3px; background:var(--teal-mid); border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--teal); border-radius:99px; transition:width .5s cubic-bezier(.4,0,.2,1); }

  .card { width:100%; max-width:580px; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:40px 40px 36px; margin-top:24px; animation:slideUp .35s cubic-bezier(.4,0,.2,1) both; }
  @keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .q-number { font-size:11px; font-weight:500; color:var(--teal); letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px; }
  .q-label { font-family:'DM Serif Display',serif; font-size:22px; line-height:1.35; color:var(--ink); margin-bottom:6px; }
  .q-hint { font-size:13px; color:var(--ink-light); font-weight:300; margin-bottom:24px; line-height:1.5; white-space:pre-line; }
  .no-hint { margin-bottom:24px; }

  /* Radio / Checkbox options */
  .options { display:flex; flex-direction:column; gap:8px; }
  .opt { display:flex; align-items:center; gap:14px; padding:14px 16px; border:1.5px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; transition:border-color .15s,background .15s; user-select:none; font-size:14px; color:var(--ink-mid); line-height:1.4; background:var(--white); }
  .opt:hover { border-color:var(--teal-mid); background:var(--teal-light); color:var(--ink); }
  .opt.selected { border-color:var(--teal); background:var(--teal-light); color:var(--ink); }
  .opt-indicator { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .opt.selected .opt-indicator { border-color:var(--teal); background:var(--teal); }
  .opt-dot { width:7px; height:7px; border-radius:50%; background:white; opacity:0; transition:opacity .15s; }
  .opt.selected .opt-dot { opacity:1; }
  .opt-indicator.sq { border-radius:6px; }
  .opt.selected .opt-indicator.sq { border-color:var(--teal); background:var(--teal); }
  .check-icon { width:11px; height:8px; opacity:0; transition:opacity .15s; }
  .opt.selected .check-icon { opacity:1; }

  /* Scale */
  .scale-wrap { display:flex; flex-direction:column; gap:12px; }
  .scale-buttons { display:flex; gap:5px; flex-wrap:wrap; }
  .scale-btn { flex:1; min-width:36px; padding:12px 4px; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--white); cursor:pointer; font-family:'DM Serif Display',serif; font-size:16px; color:var(--ink-mid); text-align:center; transition:all .15s; }
  .scale-btn:hover { border-color:var(--teal-mid); background:var(--teal-light); }
  .scale-btn.selected { border-color:var(--teal); background:var(--teal); color:white; }
  .scale-labels { display:flex; justify-content:space-between; font-size:11px; color:var(--ink-light); font-weight:300; }

  /* Short text */
  .q-input { width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); background:var(--white); outline:none; transition:border-color .15s; font-weight:300; }
  .q-input:focus { border-color:var(--teal); }
  .q-input::placeholder { color:var(--ink-light); }

  /* Textarea */
  .q-textarea { width:100%; min-height:120px; padding:14px 16px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); background:var(--white); resize:vertical; outline:none; transition:border-color .15s; font-weight:300; line-height:1.6; }
  .q-textarea:focus { border-color:var(--teal); }
  .q-textarea::placeholder { color:var(--ink-light); }

  /* Matrix */
  .matrix-wrap { overflow-x:auto; }
  .matrix-table { width:100%; border-collapse:collapse; font-size:13px; }
  .matrix-table th { padding:8px 12px; text-align:center; color:var(--ink-light); font-weight:400; font-size:12px; border-bottom:1px solid var(--border); }
  .matrix-table th:first-child { text-align:left; min-width:180px; }
  .matrix-table td { padding:10px 12px; text-align:center; border-bottom:1px solid var(--border); vertical-align:middle; }
  .matrix-table td:first-child { text-align:left; color:var(--ink-mid); font-size:13px; line-height:1.4; }
  .matrix-table tr:last-child td { border-bottom:none; }
  .matrix-table tr:hover td { background:var(--teal-light); }
  .matrix-radio { width:18px; height:18px; border:1.5px solid var(--border); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; background:var(--white); }
  .matrix-radio.selected { border-color:var(--teal); background:var(--teal); }
  .matrix-radio-dot { width:7px; height:7px; border-radius:50%; background:white; opacity:0; transition:opacity .15s; }
  .matrix-radio.selected .matrix-radio-dot { opacity:1; }

  /* Nav */
  .nav { display:flex; align-items:center; justify-content:space-between; margin-top:32px; }
  .btn-back { padding:12px 20px; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:transparent; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink-light); cursor:pointer; transition:all .15s; }
  .btn-back:hover { color:var(--ink); border-color:var(--ink-mid); }
  .btn-next { padding:13px 32px; border:none; border-radius:var(--radius-sm); background:var(--teal); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:white; cursor:pointer; transition:opacity .15s,transform .1s; display:flex; align-items:center; gap:8px; }
  .btn-next:hover { opacity:.88; }
  .btn-next:active { transform:scale(.98); }
  .btn-next:disabled { opacity:.35; cursor:not-allowed; transform:none; }
  .skip-link { font-size:12px; color:var(--ink-light); cursor:pointer; text-decoration:underline; text-underline-offset:3px; background:none; border:none; font-family:'DM Sans',sans-serif; }
  .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:white; border-radius:50%; animation:spin .7s linear infinite; display:none; }
  .btn-next.loading .spinner { display:block; }
  .btn-next.loading .btn-label { opacity:.6; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Loading / error */
  .loading-screen { width:100%; max-width:580px; margin-top:60px; text-align:center; }
  .loading-screen p { font-size:14px; color:var(--ink-light); margin-top:16px; }
  .load-spinner { width:32px; height:32px; border:2px solid var(--teal-mid); border-top-color:var(--teal); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto; }
  .error-screen { width:100%; max-width:580px; margin-top:40px; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:40px; text-align:center; }
  .error-screen h2 { font-family:'DM Serif Display',serif; font-size:22px; margin-bottom:10px; }
  .error-screen p { font-size:14px; color:var(--ink-light); margin-bottom:24px; }
  .btn-retry { padding:12px 28px; border:1.5px solid var(--teal); border-radius:var(--radius-sm); background:transparent; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--teal); cursor:pointer; }

  /* Toast */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#2E1A1A; color:#FCA5A5; font-size:13px; padding:12px 20px; border-radius:var(--radius-sm); transition:transform .3s ease; z-index:999; white-space:nowrap; font-family:'DM Sans',sans-serif; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* Thank you */
  .thankyou { width:100%; max-width:580px; margin-top:24px; animation:slideUp .4s cubic-bezier(.4,0,.2,1) both; }
  .ty-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:48px 40px; text-align:center; }
  .ty-icon { width:56px; height:56px; border-radius:50%; background:var(--teal-light); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
  .ty-title { font-family:'DM Serif Display',serif; font-size:28px; color:var(--ink); margin-bottom:10px; }
  .ty-sub { font-size:15px; color:var(--ink-light); font-weight:300; line-height:1.6; max-width:380px; margin:0 auto 20px; }

  @media(max-width:480px) {
    .card,.ty-card { padding:28px 20px 24px; }
    .q-label { font-size:19px; }
    .scale-btn { font-size:14px; padding:10px 2px; }
    .matrix-table th, .matrix-table td { padding:8px 6px; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar" id="topbar">
    <div class="brand">
      <div class="brand-mark">pub</div>
      <div class="brand-name">Pickleball Survey</div>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-meta">
        <div class="progress-section" id="section-label">Loading…</div>
        <div class="progress-count" id="q-count"></div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>
  <div id="main"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL  = 'https://fxqlftzkucbdmehhqxgn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4cWxmdHprdWNiZG1laGhxeGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzI0NjkyMjgsImV4cCI6MjA0ODA0NTIyOH0.PBoj-tCSit3KDUza7mWo4gdn6ZhYdHMuIHs-F7n2iJ4';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let ALL_QUESTIONS = [];   // full list from DB, sorted by sort_order
let VISITED = [];         // ordered stack of question keys actually visited
let sessionId = null;
const answers = {};       // question_key -> value

const mainEl    = document.getElementById('main');
const fillEl    = document.getElementById('progress-fill');
const sectionEl = document.getElementById('section-label');
const countEl   = document.getElementById('q-count');
const toastEl   = document.getElementById('toast');

// ── Helpers ────────────────────────────────────────────────────
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 4000);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function qByKey(key) {
  return ALL_QUESTIONS.find(q => q.question_key === key);
}
function currentQ() {
  return qByKey(VISITED[VISITED.length - 1]);
}

// ── Logic: determine next question key ────────────────────────
function nextKey(q) {
  const rules = q.logic_rules
    ? (typeof q.logic_rules === 'string' ? JSON.parse(q.logic_rules) : q.logic_rules)
    : null;
  const val = answers[q.question_key];

  if (rules && rules.length) {
    let defaultTarget = null;

    for (const rule of rules) {
      // Collect default_jump but don't return it yet
      if (rule.default_jump !== undefined) {
        defaultTarget = rule.default_jump;
        continue;
      }
      // Check conditional rules first
      if (rule.if_answer !== undefined) {
        const matched = Array.isArray(val)
          ? val.includes(rule.if_answer)
          : val === rule.if_answer;
        if (matched) return rule.jump_to;
      }
      if (rule.if_not_empty !== undefined) {
        if (val && val.length > 0) return rule.jump_to;
      }
    }

    // No conditional rule matched - use default
    if (defaultTarget) return defaultTarget;
  }

  // No logic at all - go to next in sort_order
  const idx = ALL_QUESTIONS.findIndex(x => x.question_key === q.question_key);
  if (idx < ALL_QUESTIONS.length - 1) return ALL_QUESTIONS[idx + 1].question_key;
  return null;
}

// ── Load questions ─────────────────────────────────────────────
async function loadQuestions() {
  mainEl.innerHTML = `<div class="loading-screen"><div class="load-spinner"></div><p>Loading survey…</p></div>`;
  const { data, error } = await db.from('survey_questions').select('*').eq('is_active', true).order('sort_order');
  if (error || !data || !data.length) {
    mainEl.innerHTML = `<div class="error-screen"><h2>Couldn't load</h2><p>Please check your connection and try again.</p><button class="btn-retry" onclick="loadQuestions()">Retry</button></div>`;
    return;
  }
  ALL_QUESTIONS = data;
  VISITED = [ALL_QUESTIONS[0].question_key];
  renderCurrent();
}

// ── Session ────────────────────────────────────────────────────
async function ensureSession() {
  if (sessionId) return true;
  const { data, error } = await db.from('survey_sessions').insert({ started_at: new Date().toISOString() }).select('id').single();
  if (error) { showToast('Session error - please refresh.'); return false; }
  sessionId = data.id;
  return true;
}

// ── Save answer ────────────────────────────────────────────────
async function saveAnswer(q, value) {
  const ok = await ensureSession();
  if (!ok) return { error: 'no session' };

  const payload = {
    session_id:   sessionId,
    question_id:  q.id,
    question_key: q.question_key,
    answered_at:  new Date().toISOString(),
    answer_text:  null, answer_array: null, answer_int: null, answer_json: null
  };

  if (q.type === 'radio' || q.type === 'short_text' || q.type === 'textarea') {
    payload.answer_text = value || null;
  } else if (q.type === 'checkbox') {
    payload.answer_array = (value && value.length) ? value : null;
  } else if (q.type === 'scale') {
    payload.answer_int = value !== undefined ? value : null;
  } else if (q.type === 'matrix') {
    payload.answer_json = (value && Object.keys(value).length) ? value : null;
  }

  const { data: existing } = await db.from('survey_answers').select('id')
    .eq('session_id', sessionId).eq('question_id', q.id).maybeSingle();

  if (existing) {
    const { error } = await db.from('survey_answers').update(payload).eq('id', existing.id);
    return { error };
  } else {
    const { error } = await db.from('survey_answers').insert(payload);
    return { error };
  }
}

async function markComplete() {
  if (!sessionId) return { error: 'no session' };
  const { error } = await db.from('survey_sessions').update({ submitted_at: new Date().toISOString(), completed: true }).eq('id', sessionId);
  return { error };
}

// ── Progress ───────────────────────────────────────────────────
function updateProgress() {
  const q   = currentQ();
  const idx = ALL_QUESTIONS.findIndex(x => x.question_key === q.question_key);
  const pct = Math.round(((idx + 1) / ALL_QUESTIONS.length) * 100);
  fillEl.style.width = pct + '%';
  sectionEl.textContent = q.section;
  countEl.textContent   = (idx + 1) + ' of ' + ALL_QUESTIONS.length;
}

// ── Render ─────────────────────────────────────────────────────
function renderCurrent() {
  const q = currentQ();
  updateProgress();

  const opts = q.options
    ? (typeof q.options === 'string' ? JSON.parse(q.options) : q.options)
    : [];

  let inputHTML = '';

  if (q.type === 'radio') {
    inputHTML = `<div class="options" id="opts">` +
      opts.map(opt => `
        <div class="opt${answers[q.question_key]===opt?' selected':''}" data-val="${esc(opt)}" onclick="pickRadio(this)">
          <div class="opt-indicator"><div class="opt-dot"></div></div>
          <span>${esc(opt)}</span>
        </div>`).join('') + `</div>`;

  } else if (q.type === 'checkbox') {
    const maxSel = q.max_selections || 99;
    inputHTML = `<div class="options" id="opts">` +
      opts.map(opt => `
        <div class="opt${(answers[q.question_key]||[]).includes(opt)?' selected':''}" data-val="${esc(opt)}" onclick="pickCheck(this,${maxSel})">
          <div class="opt-indicator sq">
            <svg class="check-icon" viewBox="0 0 11 8" fill="none">
              <path d="M1 4L4 7L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>${esc(opt)}</span>
        </div>`).join('') + `</div>`;

  } else if (q.type === 'scale') {
    const minVal = q.scale_min !== null && q.scale_min !== undefined ? q.scale_min : 1;
    const maxVal = q.scale_max !== null && q.scale_max !== undefined ? q.scale_max : 10;
    const btns = [];
    for (let n = minVal; n <= maxVal; n++)
      btns.push(`<div class="scale-btn${answers[q.question_key]===n?' selected':''}" onclick="pickScale(${n},this)">${n}</div>`);
    inputHTML = `<div class="scale-wrap">
      <div class="scale-buttons">${btns.join('')}</div>
      <div class="scale-labels">
        <span>${q.scale_left || ''}</span>
        <span>${q.scale_right || ''}</span>
      </div>
    </div>`;

  } else if (q.type === 'short_text') {
    inputHTML = `<input class="q-input" type="text" placeholder="Type your answer…"
      value="${esc(answers[q.question_key]||'')}"
      oninput="answers['${q.question_key}']=this.value;refreshBtn()">`;

  } else if (q.type === 'textarea') {
    inputHTML = `<textarea class="q-textarea" placeholder="Type your answer…"
      oninput="answers['${q.question_key}']=this.value;refreshBtn()">${esc(answers[q.question_key]||'')}</textarea>`;

  } else if (q.type === 'matrix') {
    // Matrix: rows from JSON field (stored in options for matrix)
    // Parse the matrix rows from the original data
    const matrixRows = getMatrixRows(q);
    const matrixCols = ['1','2','3','4','5'];
    const saved = answers[q.question_key] || {};
    inputHTML = `<div class="matrix-wrap"><table class="matrix-table">
      <thead><tr>
        <th></th>
        ${matrixCols.map(c => `<th>${c}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${matrixRows.map(row => `
          <tr>
            <td>${esc(row)}</td>
            ${matrixCols.map(col => `
              <td>
                <div class="matrix-radio${saved[row]===col?' selected':''}"
                  onclick="pickMatrix('${q.question_key}','${esc(row)}','${col}',this)">
                  <div class="matrix-radio-dot"></div>
                </div>
              </td>`).join('')}
          </tr>`).join('')}
      </tbody>
    </table></div>`;
  }

  const isFirst = VISITED.length === 1;
  const isLast  = nextKey(q) === null;

  const globalIdx = ALL_QUESTIONS.findIndex(x => x.question_key === q.question_key);

  mainEl.innerHTML = `
    <div class="card">
      <div class="q-number">Question ${globalIdx + 1}</div>
      <div class="q-label">${q.label}</div>
      ${q.hint
        ? `<div class="q-hint">${q.hint}</div>`
        : `<div class="no-hint"></div>`}
      ${inputHTML}
      <div class="nav">
        ${isFirst ? '<div></div>' : '<button class="btn-back" onclick="goBack()">← Back</button>'}
        <div style="display:flex;align-items:center;gap:16px;">
          <button class="btn-next" id="btn-next"
            onclick="${isLast ? 'submitSurvey()' : 'goNext()'}"
            ${needsAnswer(q) ? 'disabled' : ''}>
            <span class="btn-label">${isLast ? 'Submit' : 'Continue →'}</span>
            <div class="spinner"></div>
          </button>
        </div>
      </div>
    </div>`;
}

// Matrix rows come from the fields data embedded at build time
// We store them per question_key
const MATRIX_ROWS = {
  'how_much_does_each_of_the_following': [
    'Finding players at your own skill level quickly',
    'Knowing the game details (time, court, format) in advance',
    'Not having to share your phone number with strangers',
    'Keeping game-related communication separate from your regular personal messaging',
    'Having a record of your playing history and how your game has progressed'
  ]
};
function getMatrixRows(q) {
  return MATRIX_ROWS[q.question_key] || [];
}

// ── Answer logic ───────────────────────────────────────────────
function needsAnswer(q) {
  const v = answers[q.question_key];
  if (q.type === 'radio')      return !v;
  if (q.type === 'checkbox')   return !(v && v.length > 0);
  if (q.type === 'scale')      return v === undefined || v === null;
  if (q.type === 'short_text') return !v || !v.trim();
  if (q.type === 'textarea')   return false; // free-form text, never block
  if (q.type === 'matrix') {
    const rows = getMatrixRows(q);
    if (!rows.length) return false;
    return !v || rows.some(r => v[r] === undefined || v[r] === null);
  }
  return false;
}
function refreshBtn() {
  const btn = document.getElementById('btn-next');
  if (btn) btn.disabled = needsAnswer(currentQ());
}

function pickRadio(el) {
  const q = currentQ();
  const val = el.dataset.val;
  answers[q.question_key] = val;
  document.querySelectorAll('#opts .opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  saveAnswer(q, val);
  refreshBtn();
  // Auto-advance after short delay so user sees their selection
  setTimeout(() => goNext(), 400);
}

function pickCheck(el, max) {
  const q   = currentQ();
  const key = q.question_key;
  const val = el.dataset.val;
  if (!answers[key]) answers[key] = [];
  if (answers[key].includes(val)) {
    answers[key] = answers[key].filter(v => v !== val);
    el.classList.remove('selected');
  } else {
    if (answers[key].length >= max) {
      const first = document.querySelector('#opts .opt.selected');
      if (first) {
        answers[key] = answers[key].filter(v => v !== first.dataset.val);
        first.classList.remove('selected');
      }
    }
    answers[key].push(val);
    el.classList.add('selected');
  }
  saveAnswer(q, answers[key]);
  refreshBtn();
}

function pickScale(val, el) {
  const q = currentQ();
  answers[q.question_key] = val;
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  saveAnswer(q, val);
  refreshBtn();
  // Auto-advance after short delay
  setTimeout(() => goNext(), 400);
}

function pickMatrix(key, row, col, el) {
  if (!answers[key]) answers[key] = {};
  answers[key][row] = col;
  // Deselect siblings in same row
  el.closest('tr').querySelectorAll('.matrix-radio').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  const q = currentQ();
  saveAnswer(q, answers[key]);
  refreshBtn();
  // Auto-advance only when ALL rows are answered
  if (!needsAnswer(q)) {
    setTimeout(() => goNext(), 500);
  }
}

// ── Navigation ─────────────────────────────────────────────────
function goNext() {
  const q    = currentQ();
  const next = nextKey(q);
  if (!next) { submitSurvey(); return; }
  // Always push - VISITED is a history stack, duplicates are fine
  // because goBack() just pops one level
  VISITED.push(next);
  renderCurrent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (VISITED.length > 1) {
    VISITED.pop();
    renderCurrent();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function skip() { goNext(); }

// ── Submit ─────────────────────────────────────────────────────
async function submitSurvey() {
  const btn = document.getElementById('btn-next');
  btn.classList.add('loading');
  btn.disabled = true;

  const ok = await ensureSession();
  if (!ok) { btn.classList.remove('loading'); btn.disabled = false; return; }

  for (const q of ALL_QUESTIONS) {
    const val = answers[q.question_key];
    const has = val !== undefined && val !== null && val !== '' &&
                !(Array.isArray(val) && !val.length) &&
                !(typeof val === 'object' && !Array.isArray(val) && !Object.keys(val).length);
    if (has) {
      const { error } = await saveAnswer(q, val);
      if (error) {
        console.error('Save error', q.question_key, error);
        showToast('Could not save - please try again.');
        btn.classList.remove('loading'); btn.disabled = false;
        return;
      }
    }
  }

  const { error } = await markComplete();
  if (error) {
    showToast('Could not submit - please try again.');
    btn.classList.remove('loading'); btn.disabled = false;
    return;
  }

  showThankYou();
}
